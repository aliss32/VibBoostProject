name: Auto-Release on Program.cs Update

on:
  push:
    branches: [ "main" ]
    paths:
      - '**/Program.cs' # Sadece Program.cs güncellendiğinde çalışır

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Single File EXE
      run: |
        dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishTrimmed=false /p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

    # Benzersiz bir sürüm etiketi oluşturmak için o anki tarihi alır
    - name: Generate Dynamic Version Tag
      id: date
      run: echo "date=$(Get-Date -Format 'yyyyMMdd-HHmmss')" >> $env:GITHUB_ENV

    # EXE'yi otomatik olarak Releases sekmesinde yayınlar
    - name: Create Auto Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./publish/*.exe
        tag_name: build-${{ env.date }}
        name: VibBoost Auto-Build (${{ env.date }})
        body: |
          🚀 **Automated Release triggered by Program.cs update.**
          
          *New changes have been pushed to the codebase. Download the .exe below to test the latest features.*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
